<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPIs 2026 — Grupo Tracbel</title>
<style>
:root{--azul:#0d2340;--azul2:#1b3a5f;--verde:#1f8a4c;--amarelo:#d9a300;--vermelho:#c0392b;--cinza:#f4f6f8;--linha:#e2e7ec;--texto:#1c2733;--suave:#6b7785}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--texto);background:#eef1f4;font-size:14px;line-height:1.45}
header{background:linear-gradient(120deg,var(--azul),var(--azul2));color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
header h1{font-size:19px;font-weight:700}
header .sub{opacity:.85;font-size:12px;margin-top:3px}
header .userbox{font-size:12px;text-align:right}
.wrap{max-width:1280px;margin:0 auto;padding:0 18px 60px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0}
.card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card .n{font-size:25px;font-weight:700}
.card .l{font-size:12px;color:var(--suave);margin-top:2px}
.card.v .n{color:var(--verde)}.card.a .n{color:var(--amarelo)}.card.r .n{color:var(--vermelho)}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tab{padding:8px 16px;background:#fff;border:1px solid var(--linha);border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--suave)}
.tab.active{background:var(--azul);color:#fff;border-color:var(--azul)}
.empresa{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:22px;overflow:hidden}
.empresa>h2{background:var(--cinza);padding:13px 20px;font-size:15px;border-bottom:1px solid var(--linha)}
.cat{padding:6px 20px 18px}
.cat h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--azul2);margin:16px 0 6px;font-weight:700}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--linha);font-size:13px;vertical-align:middle}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--suave);font-weight:600}
td.kpi{font-weight:500;width:38%}
td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
td.meta{text-align:right;font-weight:600;color:var(--azul2)}
input.real{width:120px;text-align:right;padding:6px 8px;border:1px solid var(--linha);border-radius:6px;font-family:inherit;font-size:13px;font-variant-numeric:tabular-nums}
input.real:focus{outline:none;border-color:var(--azul2);box-shadow:0 0 0 2px rgba(27,58,95,.12)}
.rdonly{color:var(--texto);font-variant-numeric:tabular-nums}
.farol{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:-1px}
.f-v{background:var(--verde)}.f-a{background:var(--amarelo)}.f-r{background:var(--vermelho)}.f-n{background:#c2cad3}
.desvio{font-weight:600;font-variant-numeric:tabular-nums}
.d-pos{color:var(--verde)}.d-neg{color:var(--vermelho)}.d-zero{color:var(--suave)}
.ref{color:var(--suave);font-size:11.5px}
.dirtag{font-size:10px;color:var(--suave);border:1px solid var(--linha);border-radius:4px;padding:1px 5px;margin-left:6px}
button{font-family:inherit;font-size:13px;border:1px solid var(--linha);background:#fff;color:var(--texto);padding:8px 14px;border-radius:7px;cursor:pointer}
button.primary{background:var(--azul);color:#fff;border-color:var(--azul)}
.login{max-width:380px;margin:8vh auto;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:32px 28px}
.login h1{font-size:19px;margin-bottom:4px;color:var(--azul)}
.login p{font-size:13px;color:var(--suave);margin-bottom:20px}
.login label{font-size:12px;font-weight:600;color:var(--suave);display:block;margin:12px 0 4px}
.login input{width:100%;padding:10px 12px;border:1px solid var(--linha);border-radius:8px;font-size:14px;font-family:inherit}
.login button{width:100%;margin-top:18px;padding:11px}
.err{color:var(--vermelho);font-size:12.5px;margin-top:12px;min-height:16px}
.note{font-size:12px;color:var(--suave);background:#fff8e6;border:1px solid #f0e3b8;border-radius:8px;padding:10px 14px;margin-bottom:16px}
.badge-ro{font-size:11px;background:#eef1f4;color:var(--suave);border:1px solid var(--linha);padding:3px 9px;border-radius:12px}
footer{text-align:center;color:var(--suave);font-size:12px;padding:20px}
@media(max-width:640px){
 header{padding:14px 16px}
 header h1{font-size:16px}
 header .sub{font-size:11.5px}
 header .userbox{text-align:left}
 .wrap{padding:0 12px 48px}
 .cards{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:14px 0}
 .card{padding:13px 14px}
 .card .n{font-size:22px}
 .tab{padding:7px 13px;font-size:12.5px}
 .empresa{border-radius:10px;margin-bottom:16px}
 .empresa>h2{padding:12px 14px;font-size:14px}
 .cat{padding:4px 12px 12px}
 .cat h3{margin:14px 0 4px}
 /* Tabelas viram cartões empilhados em telas pequenas */
 table,tbody,tr,td{display:block;width:100%}
 thead{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
 tr{border:1px solid var(--linha);border-radius:10px;margin:0 0 10px;overflow:hidden}
 td{display:flex;justify-content:space-between;align-items:center;gap:14px;border:none;border-top:1px solid var(--linha);padding:9px 14px;text-align:right;font-size:13px}
 td::before{content:attr(data-label);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--suave);text-align:left;flex:0 0 auto}
 td.kpi{display:block;width:auto;text-align:left;font-weight:600;background:var(--cinza);border-top:none;padding:10px 14px}
 td.kpi::before{display:none}
 td.kpi .ref{margin-top:3px;white-space:normal}
 input.real{width:140px;padding:8px 10px}
 .login{margin:6vh 14px;max-width:none;padding:28px 22px}
 .note{font-size:12px}
}
@media print{.tabs,button{display:none}}
</style>
</head>

<div id="app" style="padding:24px;color:#6b7785">Carregando…</div>
<script>
var SUPA_URL="https://npwzbhqygshnugyljtop.supabase.co", SUPA_KEY="sb_publishable_OwngHzAkLCOqfll3eKl7Ng_WjaSX657";
var KPIS=[], isAdmin=false, userEmail="", activeTab=0;
function token(){return localStorage.getItem('tb_tok')||'';}
function setSession(t,e){localStorage.setItem('tb_tok',t);localStorage.setItem('tb_email',e);}
function clearSession(){localStorage.removeItem('tb_tok');localStorage.removeItem('tb_email');}
async function api(method,path,body){var headers={'apikey':SUPA_KEY,'Authorization':'Bearer '+(token()||SUPA_KEY)};if(body){headers['Content-Type']='application/json';headers['Prefer']='return=minimal';}return await fetch(SUPA_URL+path,{method:method,headers:headers,body:body?JSON.stringify(body):undefined});}
function fmtVal(v,fmt){if(v===null||v===undefined||v==="")return "—";var n=Number(v);if(isNaN(n))return v;if(fmt==='pct')return n.toLocaleString('pt-BR',{maximumFractionDigits:2})+'%';if(fmt==='brl')return 'R$ '+n.toLocaleString('pt-BR',{maximumFractionDigits:0});if(fmt==='milBRL')return n.toLocaleString('pt-BR',{maximumFractionDigits:0});return n.toLocaleString('pt-BR',{maximumFractionDigits:2});}
function parseNum(s){if(s===null||s===undefined)return NaN;s=String(s).trim().replace(/[R$%\s]/g,'').replace(/\./g,'').replace(',','.');if(s==='')return NaN;return Number(s);}
function status(meta,real,dir){if(meta===null||meta===undefined||dir===0||isNaN(Number(meta)))return{cls:'f-n',at:null};if(real===null||real===undefined||real===''||isNaN(Number(real)))return{cls:'f-n',at:null};var m=Number(meta),r=Number(real),at;if(dir===1)at=m===0?(r>=0?1:0):r/m;else at=r===0?1:m/r;var cls=at>=1?'f-v':(at>=0.9?'f-a':'f-r');return{cls:cls,at:at};}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderLogin(msg){var h='<div class="login"><h1>Dashboard KPIs 2026</h1><p>Grupo Tracbel — acesso restrito. Entre com seu e-mail e senha.</p>';h+='<label>E-mail</label><input id="email" type="email" autocomplete="username">';h+='<label>Senha</label><input id="pwd" type="password" autocomplete="current-password">';h+='<button class="primary" id="btnlogin">Entrar</button><div class="err" id="err">'+(msg||'')+'</div><div style="text-align:center;margin-top:14px"><a href="#" onclick="solicitarAcesso();return false" style="font-size:12.5px;color:#1b3a5f">Solicitar acesso</a></div></div>';document.getElementById('app').innerHTML=h;document.getElementById('btnlogin').onclick=doLogin;document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});}
async function doLogin(){var email=document.getElementById('email').value.trim();var pwd=document.getElementById('pwd').value;var er=document.getElementById('err');er.textContent='Entrando...';try{var res=await fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pwd})});var data=await res.json();if(!res.ok){er.textContent='Falha no login: '+(data.error_description||data.msg||data.message||('erro '+res.status));return;}setSession(data.access_token,(data.user&&data.user.email)||email);boot();}catch(e){er.textContent='Erro de conexão: '+e.message;}}
function doLogout(){clearSession();location.reload();}
function trocarSenha(){
 if(document.getElementById('pwmodal'))return;
 var ov=document.createElement('div');ov.id='pwmodal';
 ov.style.cssText='position:fixed;inset:0;background:rgba(13,35,64,.45);display:flex;align-items:center;justify-content:center;z-index:9999';
 ov.innerHTML='<div style="background:#fff;border-radius:14px;padding:26px 24px;max-width:360px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.25)"><h2 style="font-size:17px;color:#0d2340;margin-bottom:6px">Trocar senha</h2><p style="font-size:12.5px;color:#6b7785;margin-bottom:14px">Defina uma nova senha (m&iacute;nimo 8 caracteres).</p><label style="font-size:12px;font-weight:600;color:#6b7785">Nova senha</label><input id="np1" type="password" autocomplete="new-password" style="width:100%;padding:10px 12px;border:1px solid #e2e7ec;border-radius:8px;margin:4px 0 10px;font-size:14px;font-family:inherit"><label style="font-size:12px;font-weight:600;color:#6b7785">Confirmar nova senha</label><input id="np2" type="password" autocomplete="new-password" style="width:100%;padding:10px 12px;border:1px solid #e2e7ec;border-radius:8px;margin:4px 0 6px;font-size:14px;font-family:inherit"><div id="pwerr" style="color:#c0392b;font-size:12px;min-height:16px"></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px"><button onclick="fecharPw()" style="padding:9px 14px;border:1px solid #e2e7ec;background:#fff;border-radius:7px;cursor:pointer;font-family:inherit">Cancelar</button><button onclick="salvarPw()" style="padding:9px 14px;border:none;background:#0d2340;color:#fff;border-radius:7px;cursor:pointer;font-family:inherit">Salvar</button></div></div>';
 document.body.appendChild(ov);document.getElementById('np1').focus();
}
function fecharPw(){var m=document.getElementById('pwmodal');if(m)m.remove();}
async function salvarPw(){
 var p1=document.getElementById('np1').value,p2=document.getElementById('np2').value,er=document.getElementById('pwerr');
 if(p1.length<8){er.textContent='A senha deve ter ao menos 8 caracteres.';return;}
 if(p1!==p2){er.textContent='As senhas não coincidem.';return;}
 er.textContent='Salvando...';
 try{
  var r=await fetch(SUPA_URL+'/auth/v1/user',{method:'PUT',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token(),'Content-Type':'application/json'},body:JSON.stringify({password:p1})});
  var d=await r.json();
  if(!r.ok){er.textContent='Erro: '+(d.msg||d.error_description||d.message||('codigo '+r.status));return;}
  fecharPw();alert('Senha alterada com sucesso. Use a nova senha no próximo acesso.');
 }catch(e){er.textContent='Erro de conexão: '+e.message;}
}
function solicitarAcesso(){
 if(document.getElementById('solmodal'))return;
 var ov=document.createElement('div');ov.id='solmodal';
 ov.style.cssText='position:fixed;inset:0;background:rgba(13,35,64,.45);display:flex;align-items:center;justify-content:center;z-index:9999';
 ov.innerHTML='<div style="background:#fff;border-radius:14px;padding:26px 24px;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.25)"><h2 style="font-size:17px;color:#0d2340;margin-bottom:6px">Solicitar acesso</h2><p style="font-size:12.5px;color:#6b7785;margin-bottom:14px">Preencha seus dados. A solicitação será avaliada por um administrador.</p><label style="font-size:12px;font-weight:600;color:#6b7785">Nome</label><input id="sol_nome" style="width:100%;padding:10px 12px;border:1px solid #e2e7ec;border-radius:8px;margin:4px 0 10px;font-size:14px;font-family:inherit"><label style="font-size:12px;font-weight:600;color:#6b7785">E-mail corporativo</label><input id="sol_email" type="email" autocomplete="email" style="width:100%;padding:10px 12px;border:1px solid #e2e7ec;border-radius:8px;margin:4px 0 10px;font-size:14px;font-family:inherit"><label style="font-size:12px;font-weight:600;color:#6b7785">Justificativa (opcional)</label><textarea id="sol_motivo" rows="2" style="width:100%;padding:10px 12px;border:1px solid #e2e7ec;border-radius:8px;margin:4px 0 6px;font-size:14px;font-family:inherit"></textarea><div id="sol_msg" style="font-size:12px;min-height:16px"></div><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px"><button onclick="fecharSol()" style="padding:9px 14px;border:1px solid #e2e7ec;background:#fff;border-radius:7px;cursor:pointer;font-family:inherit">Cancelar</button><button onclick="enviarSol()" style="padding:9px 14px;border:none;background:#0d2340;color:#fff;border-radius:7px;cursor:pointer;font-family:inherit">Enviar</button></div></div>';
 document.body.appendChild(ov);document.getElementById('sol_nome').focus();
}
function fecharSol(){var m=document.getElementById('solmodal');if(m)m.remove();}
async function enviarSol(){
 var nome=document.getElementById('sol_nome').value.trim(),email=document.getElementById('sol_email').value.trim(),motivo=document.getElementById('sol_motivo').value.trim(),msg=document.getElementById('sol_msg');
 if(!email||email.indexOf('@')<1){msg.style.color='#c0392b';msg.textContent='Informe um e-mail válido.';return;}
 msg.style.color='#6b7785';msg.textContent='Enviando...';
 try{
  var r=await fetch(SUPA_URL+'/functions/v1/request-access',{method:'POST',headers:{'apikey':SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({email:email,nome:nome,motivo:motivo})});
  if(!r.ok){msg.style.color='#c0392b';msg.textContent='Erro ao enviar (código '+r.status+').';return;}
  msg.style.color='#1f8a4c';msg.textContent='Solicitação enviada! Você será avisado após a aprovação.';
  setTimeout(fecharSol,1800);
 }catch(e){msg.style.color='#c0392b';msg.textContent='Erro de conexão: '+e.message;}
}
async function carregarSolicitacoes(){
 var box=document.getElementById('solreq');if(!box)return;
 var r=await api('GET','/rest/v1/access_requests?status=eq.pendente&select=*&order=created_at.asc');
 if(!r.ok){box.innerHTML='';return;}
 var d=await r.json();
 if(!d||d.length===0){box.innerHTML='';return;}
 var h='<div style="background:#fff;border:1px solid #f0e3b8;border-left:4px solid #d9a300;border-radius:10px;padding:14px 18px"><div style="font-weight:700;color:#0d2340;margin-bottom:6px">Solicitações de acesso pendentes ('+d.length+')</div>';
 d.forEach(function(s){
  h+='<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid #eef1f4;flex-wrap:wrap"><div style="font-size:13px"><b>'+esc(s.nome||s.email)+'</b> &lt;'+esc(s.email)+'&gt;'+(s.motivo?'<div style="color:#6b7785;font-size:12px">'+esc(s.motivo)+'</div>':'')+'</div><div style="white-space:nowrap;display:flex;gap:6px"><button onclick="aprovar(\''+s.id+'\',false)" style="padding:6px 10px;border:none;background:#1f8a4c;color:#fff;border-radius:6px;cursor:pointer;font-size:12px">Aprovar (leitura)</button><button onclick="aprovar(\''+s.id+'\',true)" style="padding:6px 10px;border:none;background:#0d2340;color:#fff;border-radius:6px;cursor:pointer;font-size:12px">Aprovar (editor)</button><button onclick="recusar(\''+s.id+'\')" style="padding:6px 10px;border:1px solid #e8c4bf;background:#fff;color:#c0392b;border-radius:6px;cursor:pointer;font-size:12px">Recusar</button></div></div>';
 });
 h+='</div>';box.innerHTML=h;
}
async function aprovar(id,editor){
 var r=await fetch(SUPA_URL+'/functions/v1/approve-access',{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token(),'Content-Type':'application/json'},body:JSON.stringify({request_id:id,as_editor:editor})});
 var d={};try{d=await r.json();}catch(e){}
 if(!r.ok){alert('Erro ao aprovar: '+(d.error||('código '+r.status)));return;}
 alert('Acesso aprovado para '+d.email+'.\nSenha provisória: '+d.senha+'\nPerfil: '+(editor?'editor':'leitura'));
 carregarSolicitacoes();
}
async function recusar(id){
 if(!confirm('Recusar esta solicitação?'))return;
 await api('PATCH','/rest/v1/access_requests?id=eq.'+id,{status:'recusado'});
 carregarSolicitacoes();
}
async function loadData(){var r=await api('GET','/rest/v1/kpis?select=*&order=ord.asc');if(r.status===401){clearSession();renderLogin('Sessão expirada. Entre novamente.');return false;}if(!r.ok){document.getElementById('app').innerHTML='<div class="login"><h1>Erro</h1><p>Falha ao carregar dados (código '+r.status+').</p><button class="primary" onclick="doLogout()">Sair</button></div>';return false;}KPIS=await r.json();var a=await api('GET','/rest/v1/admins?select=email&limit=1');var adata=a.ok?await a.json():[];isAdmin=(adata&&adata.length>0);return true;}
function groupData(){var emp=[],map={};KPIS.forEach(function(k){if(!map[k.empresa]){map[k.empresa]={empresa:k.empresa,cats:{},catOrder:[]};emp.push(map[k.empresa]);}var e=map[k.empresa];if(!e.cats[k.categoria]){e.cats[k.categoria]=[];e.catOrder.push(k.categoria);}e.cats[k.categoria].push(k);});return emp;}
function renderApp(){if(!KPIS||KPIS.length===0){document.getElementById('app').innerHTML='<div class="login"><h1>Sem permissão</h1><p>Seu usuário ('+esc(userEmail)+') ainda não está autorizado a ver os dados. Solicite liberação à Controladoria.</p><button class="primary" onclick="doLogout()">Sair</button></div>';return;}var emps=groupData(),h='';h+='<header><div><h1>Dashboard de KPIs 2026 — Grupo Tracbel</h1><div class="sub">Metas dos fabricantes + compromissos com acionistas (DRE) · dados centralizados</div></div>';h+='<div class="userbox">'+esc(userEmail)+'<br>'+(isAdmin?'<b>Edição habilitada</b>':'<span class="badge-ro">Somente leitura</span>')+' · <a href="#" onclick="trocarSenha();return false" style="color:#fff">trocar senha</a> · <a href="#" onclick="doLogout();return false" style="color:#fff">sair</a></div></header>';h+='<div class="wrap"><div class="cards" id="cards"></div>'+(isAdmin?'<div id="solreq" style="margin-bottom:16px"></div>':'');if(isAdmin)h+='<div class="note"><b>Edição:</b> digite o valor <b>Realizado</b> — salva automaticamente e fica visível para todos. Faróis: <span class="farol f-v"></span>≥100% · <span class="farol f-a"></span>90–99% · <span class="farol f-r"></span>&lt;90%.</div>';h+='<div class="tabs" id="tabs"></div><div id="content"></div>';h+='<footer>Grupo Tracbel · Dados atualizados pela Controladoria. Metas conforme documentos oficiais e orçamento DRE 2026.</footer></div>';document.getElementById('app').innerHTML=h;renderTabs(emps);renderContent(emps);renderCards();if(isAdmin)carregarSolicitacoes();}
function renderTabs(emps){var t=document.getElementById('tabs'),h='';emps.forEach(function(e,i){var nm=e.empresa.split('—')[0].trim();var sec=e.empresa.split('—')[1]?(' · '+e.empresa.split('—')[1].trim()):'';h+='<div class="tab '+(i===activeTab?'active':'')+'" onclick="setTab('+i+')">'+esc(nm)+'<span style="opacity:.6">'+esc(sec)+'</span></div>';});h+='<div class="tab '+(activeTab===-1?'active':'')+'" onclick="setTab(-1)">▦ Todos</div>';t.innerHTML=h;}
function renderContent(emps){var list=activeTab===-1?emps:[emps[activeTab]],h='';list.forEach(function(e){h+='<div class="empresa"><h2>'+esc(e.empresa)+'</h2>';e.catOrder.forEach(function(cat){h+='<div class="cat"><h3>'+esc(cat)+'</h3><table><thead><tr><th>KPI</th><th style="text-align:right">Meta 2026</th><th style="text-align:right">Realizado</th><th style="text-align:right">Desvio</th><th>Status</th></tr></thead><tbody>';e.cats[cat].forEach(function(kp){var metaDisp=kp.fmt==='txt'?(kp.meta_txt||'—'):fmtVal(kp.meta,kp.fmt);var rv=(kp.realizado===null||kp.realizado===undefined)?'':kp.realizado;var st=status(kp.meta,rv===''?null:Number(rv),kp.dir);var desvio='—',dcls='d-zero';if(st.at!==null){var pct=(st.at-1)*100;desvio=(pct>=0?'+':'')+pct.toLocaleString('pt-BR',{maximumFractionDigits:1})+'%';dcls=pct>=0?'d-pos':(pct<=-10?'d-neg':'d-zero');}var dirtag=kp.dir===-1?'<span class="dirtag">menor melhor</span>':(kp.dir===0?'<span class="dirtag">informativo</span>':'');var realCell=isAdmin?('<input class="real" data-id="'+kp.id+'" value="'+esc(rv)+'" onchange="onEdit(this)" placeholder="—">'):('<span class="rdonly">'+(rv===''?'—':fmtVal(rv,kp.fmt))+'</span>');h+='<tr><td class="kpi">'+esc(kp.kpi)+dirtag+'<div class="ref">'+esc(kp.ref||'')+'</div></td><td class="meta" data-label="Meta 2026">'+metaDisp+'</td><td class="num" data-label="Realizado">'+realCell+'</td><td class="num desvio '+dcls+'" data-label="Desvio">'+desvio+'</td><td data-label="Status"><span class="farol '+st.cls+'"></span></td></tr>';});h+='</tbody></table></div>';});h+='</div>';});document.getElementById('content').innerHTML=h;}
function renderCards(){var tot=0,v=0,a=0,r=0,pre=0;KPIS.forEach(function(kp){if(kp.dir===0||kp.meta===null)return;tot++;var rv=kp.realizado;if(rv===null||rv===undefined||rv==='')return;pre++;var st=status(kp.meta,Number(rv),kp.dir);if(st.cls==='f-v')v++;else if(st.cls==='f-a')a++;else if(st.cls==='f-r')r++;});document.getElementById('cards').innerHTML='<div class="card"><div class="n">'+tot+'</div><div class="l">KPIs mensuráveis</div></div><div class="card"><div class="n">'+pre+'</div><div class="l">Realizados preenchidos</div></div><div class="card v"><div class="n">'+v+'</div><div class="l">No alvo (≥100%)</div></div><div class="card a"><div class="n">'+a+'</div><div class="l">Atenção (90–99%)</div></div><div class="card r"><div class="n">'+r+'</div><div class="l">Abaixo (&lt;90%)</div></div>';}
function setTab(i){activeTab=i;var emps=groupData();renderTabs(emps);renderContent(emps);}
async function onEdit(el){var id=el.getAttribute('data-id');var raw=el.value.trim();var val=raw===''?null:parseNum(raw);if(raw!==''&&isNaN(val)){el.style.borderColor='var(--vermelho)';return;}el.style.borderColor='var(--linha)';var up=await api('PATCH','/rest/v1/kpis?id=eq.'+encodeURIComponent(id),{realizado:val});if(!up.ok){alert('Erro ao salvar (código '+up.status+'). Verifique se você tem permissão de edição.');return;}for(var i=0;i<KPIS.length;i++){if(KPIS[i].id===id){KPIS[i].realizado=val;break;}}var tr=el.closest('tr');var kp=KPIS.find(function(k){return k.id===id;});var st=status(kp.meta,val,kp.dir);var dCell=tr.children[3],sCell=tr.children[4];if(st.at!==null){var pct=(st.at-1)*100;dCell.textContent=(pct>=0?'+':'')+pct.toLocaleString('pt-BR',{maximumFractionDigits:1})+'%';dCell.className='num desvio '+(pct>=0?'d-pos':(pct<=-10?'d-neg':'d-zero'));}else{dCell.textContent='—';dCell.className='num desvio d-zero';}sCell.innerHTML='<span class="farol '+st.cls+'"></span>';renderCards();}
async function boot(){if(!token()){renderLogin('');return;}userEmail=localStorage.getItem('tb_email')||'';var ok=await loadData();if(!ok)return;renderApp();}
boot();
</script>
